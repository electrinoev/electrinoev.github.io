<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrino Store | Rawat Associates</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --p: #4f46e5; --dark: #0f172a; --text-light: #64748b; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--dark); padding-bottom: 100px; }

        nav { background: #fff; padding: 10px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo h1 { margin: 0; font-size: 18px; font-weight: 800; }
        .logo span { color: var(--p); font-size: 10px; font-weight: 700; text-transform: uppercase; }

        .trust-strip { background: #f1f5f9; padding: 8px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; }
        .t-badge { font-size: 10px; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 5px; }
        .t-badge i { color: var(--p); }

        .store-container { display: flex; flex-direction: column; max-width: 1300px; margin: 0 auto; padding: 20px; gap: 20px; }
        @media (min-width: 992px) { .store-container { flex-direction: row; } .sidebar { width: 320px !important; } }

        .sidebar { background: #fff; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .m-card { display: flex; align-items: center; padding: 10px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 2px solid #f1f5f9; position: relative; }
        .m-card.active { border-color: var(--p); background: #f5f3ff; }
        .m-card img { width: 50px; height: 40px; object-fit: contain; }
        .oos-tag { position: absolute; top: 5px; right: 5px; font-size: 8px; background: var(--danger); color: #fff; padding: 2px 5px; border-radius: 4px; font-weight: 800; }

        .product-view { flex: 1; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .gallery { text-align: center; margin-bottom: 25px; }
        #mainImg { width: 100%; max-width: 350px; height: 250px; object-fit: contain; }
        .thumbs { display: flex; justify-content: center; gap: 8px; margin-top: 10px; overflow-x: auto; padding: 5px; }
        .thumbs img { width: 55px; height: 55px; border-radius: 8px; cursor: pointer; border: 2px solid #eee; object-fit: cover; }
        .thumbs img.active-t { border-color: var(--p); transform: scale(1.1); }

        .warranty-box { margin-top: 20px; background: #fffaf0; border: 1px solid #feebcb; border-radius: 12px; padding: 15px; }
        .warranty-title { font-size: 12px; font-weight: 800; color: #975a16; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .w-item { font-size: 11px; font-weight: 600; color: #744210; background: #fff; padding: 5px 10px; border-radius: 6px; border: 1px solid #fbd38d; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        .price { font-size: 26px; font-weight: 800; color: var(--p); }

        .specs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin: 20px 0; }
        .spec-item { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #f1f5f9; }
        .spec-item label { font-size: 9px; color: var(--text-light); font-weight: 800; display: block; }
        .spec-item span { font-weight: 700; font-size: 12px; }

        .btn-buy { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 14px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .mobile-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 5000; height: 75px; border-top: 1px solid #eee; }
        .act-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; font-size: 11px; font-weight: 800; border-right: 1px solid #f1f5f9; }
        .act-call { color: #2563eb; }
        .act-wa { color: #16a34a; border-right: none; }
        .act-btn i { font-size: 20px; margin-bottom: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 6000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        .submit-btn { width: 100%; background: var(--p); color: #fff; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="nav-content">
        <div class="logo"><h1>Rawat Associates</h1><span>Official Electrino Dealer</span></div>
    </div>
</nav>

<div class="trust-strip">
    <div class="t-badge"><i class="fas fa-shipping-fast"></i> MAKE IN INDIA</div>
    <div class="t-badge"><i class="fas fa-bolt"></i> Low Maintenance</div>
    <div class="t-badge"><i class="fas fa-map-marker-alt"></i> Service Center Kotdwara</div>
</div>

<div class="store-container">
    <div class="sidebar" id="sidebar"></div>
    <div class="product-view">
        <div class="gallery">
            <img id="mainImg" src="">
            <div class="thumbs" id="thumbs"></div>
        </div>
        <div class="price-row">
            <div><h2 id="pName" style="margin:0; font-size:22px;"></h2><span id="stockBadge" style="font-weight:800; font-size:12px;"></span></div>
            <div class="price" id="pPrice"></div>
        </div>

        <div class="warranty-box">
            <div class="warranty-title"><i class="fas fa-shield-alt"></i> Standard Warranty</div>
            <div class="w-grid">
                <div class="w-item">Battery: 3 Year</div>
                <div class="w-item">Motor: 1 Year</div>
                <div class="w-item">Controller: 1 Year</div>
                <div class="w-item">Charger: 1 Year</div>
            </div>
        </div>

        <div class="specs-grid" id="specs"></div>
        <div id="actionArea"></div>
    </div>
</div>

<div class="mobile-actions">
    <a href="tel:7906109154" class="act-btn act-call"><i class="fas fa-phone-alt"></i> CALL NOW</a>
    <a href="#" id="waLink" class="act-btn act-wa"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
    <div class="act-btn" style="color:var(--dark); cursor:pointer" onclick="openOrder('EMI INQUIRY')"><i class="fas fa-calculator"></i> EMI INFO</div>
</div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin:0 0 15px 0;"></h3>
        <form action="https://formspree.io/f/xpqygnoz" method="POST">
            <input type="hidden" name="Type" id="fType"><input type="hidden" name="Model" id="fModel">
            
            <div id="variantSection" style="display:none;">
                <label style="font-size: 11px; font-weight: 800; color: var(--p);">CHOOSE RANGE VARIANT:</label>
                <select name="RangeVariant" id="rangeSelect" onchange="toggleWarranty()">
                    <option value="60km (48000)">60km* Range (₹48,000)</option>
                    <option value="100km (50000)">100km* Range (₹50,000)</option>
                </select>
            </div>

            <div id="warrantySection" style="display:none; margin-top: 10px;">
                <label style="font-size: 11px; font-weight: 800; color: #975a16;">BATTERY WARRANTY PLAN:</label>
                <select name="ExtendedWarranty">
                    <option value="Standard (3 Year)">Standard (3 Year Included)</option>
                    <option value="Extended (3+2 Year) +₹4000">Extended (3+2 Year) + ₹4,000</option>
                </select>
            </div>

            <input type="text" name="Name" placeholder="Aapka Naam" required>
            <input type="tel" name="Phone" placeholder="Mobile Number" pattern="[0-9]{10}" required>
            <input type="text" name="Pincode" placeholder="Pincode" required>
            <textarea name="Address" placeholder="Pura Pata (Address)" rows="3" required></textarea>
            <button class="submit-btn">SEND REQUEST</button>
            <p onclick="closeOrder()" style="text-align:center; color:red; margin-top:15px; cursor:pointer; font-weight:800;">CLOSE</p>
        </form>
    </div>
</div>

<script>
const models = [
    { name: "Electrino One", price: "48,000", inStock: true, imgs: ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPXO_E2LkncbwV4rhwUbx4NxhqUoDTecNnz-w9r7p3frmVgACDG2ht1l4&s=10", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4HNDSIUKrfHlCE5VYwh2EM5tYDgqzY7PuANIaqtpLzp4i_p1z3EkyAiY&s=10", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBXNLFcORF5io4-pjzrBzJc5t7am0Z-FXHSXIaM3x5E5csqRzctsB5ldFC&s=10"], f: {range:"60-100 Km", speed:"25 Km/h", battery:"Lithium", tyres:"10\" Tubeless",Key:"Remote Key Or Manual", Delivery:"7 Days Delivery"} },
    { name: "Electrino Dual", price: "58,000", inStock: true, imgs: ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7flBwweiz34DQuo5mKb8lsSgqhessksBARB923i2y_wBZxMSeTjohchqZ&s=10", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoJG3FbMgejiFwW2awB6mddsUx0yqer9gn6iESz-ByobqZolvzHR5t3DE&s=10"], f: {range:"100 Km", motor:"250W BLDC", battery:"Lithium", braking:"Disc/Drum", Delivery:"7 Days Delivery"} },
    { name: "Electrino Core", price: "67,500", inStock: false, imgs: ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYbGD3iqUoHDRvHN7HP2E3nbzTw-JtCtIOag5-9LMhSLIb2ugF2cQF9dM&s=10", "https://5.imimg.com/data5/SELLER/Default/2026/1/578946922/VF/JU/ZK/140597938/electrino-core-electric-scooter.jpg"], f: {range:"110 Km", speed:"25 Km/h", battery:"LFP", suspension:"Smooth", Delivery:"7 Days Delivery"} },
    { name: "Electrino Crown", price: "70,500", inStock: false, imgs: ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcToxcZRipyr8fuRWZSw3JP1YwqwHJh8Zf0Z-OBg9WJCIyMKxOcQAuyPdzIN&s=10", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6itZDKavxQtOxXwy_38F08kywe50se8xMazflVaTuaAbCPHg5MzSjo7M&s=10"], f: {range:"120 Km", motor:"Waterproof", safety:"Remote Lock", light:"LED", Delivery:"7 Days Delivery"} },
    { name: "Active Pro", price: "70,500", inStock: false, imgs: ["https://5.imimg.com/data5/SELLER/Default/2024/5/419064735/TK/TC/PC/125107375/whatsapp-image-2024-05-15-at-12-45-38-pm-1.jpeg"], f: {range:"100 Km", features:"USB Charging", battery:"Lithium", storage:"Large Boot", Delivery:"7 Days Delivery"} }
];

function loadSidebar() {
    const sb = document.getElementById('sidebar');
    models.forEach((m, i) => {
        sb.innerHTML += `<div class="m-card" onclick="showProduct(${i})">
            ${!m.inStock ? '<span class="oos-tag">OUT OF STOCK</span>' : ''}
            <img src="${m.imgs[0]}"><div class="m-card-info"><h3>${m.name}</h3><p style="margin:0; font-size:11px; color:var(--p); font-weight:800;">₹${m.price}</p></div></div>`;
    });
}

function showProduct(i) {
    const m = models[i];
    document.querySelectorAll('.m-card').forEach((c, idx) => c.className = i === idx ? 'm-card active' : 'm-card');
    document.getElementById('pName').innerText = m.name;
    document.getElementById('pPrice').innerText = '₹' + m.price;
    document.getElementById('mainImg').src = m.imgs[0];
    let th = ''; m.imgs.forEach((img, idx) => { th += `<img src="${img}" class="${idx===0?'active-t':''}" onclick="changeImg(this)">`; });
    document.getElementById('thumbs').innerHTML = th;
    let sp = ''; for(let k in m.f) { sp += `<div class="spec-item"><label>${k}</label><span>${m.f[k]}</span></div>`; }
    document.getElementById('specs').innerHTML = sp;
    const badge = document.getElementById('stockBadge');
    const area = document.getElementById('actionArea');
    if(m.inStock) {
        badge.innerText = "● Available in Kotdwara"; badge.style.color = "var(--success)";
        area.innerHTML = `<button class="btn-buy" style="background:var(--dark); color:#fff" onclick="openOrder('ORDER BOOKING')"><i class="fas fa-shopping-bag"></i> BUY NOW (COD)</button>
                          <button class="btn-buy" style="background:var(--success); color:#fff" onclick="openOrder('TEST RIDE')"><i class="fas fa-motorcycle"></i> BOOK FREE TEST RIDE</button>`;
    } else {
        badge.innerText = "● Out of Stock"; badge.style.color = "var(--danger)";
        area.innerHTML = `<button class="btn-buy" style="background:#cbd5e1; color:#64748b; cursor:not-allowed;" disabled>TEMPORARILY OUT OF STOCK</button>
                          <button class="btn-buy" style="background:var(--p); color:#fff" onclick="openOrder('NOTIFY ME')"><i class="fas fa-bell"></i> NOTIFY ME WHEN AVAILABLE</button>`;
    }
    document.getElementById('waLink').href = `https://wa.me/918941875809?text=Interested in Electrino ${m.name}`;
}

function changeImg(el) { document.getElementById('mainImg').src = el.src; document.querySelectorAll('.thumbs img').forEach(t => t.classList.remove('active-t')); el.classList.add('active-t'); }

// Function to handle warranty logic based on range selection
function toggleWarranty() {
    const rangeValue = document.getElementById('rangeSelect').value;
    const warrantySec = document.getElementById('warrantySection');
    // Show warranty ONLY for 100km variant
    if(rangeValue.includes("100km")) {
        warrantySec.style.display = 'block';
    } else {
        warrantySec.style.display = 'none';
    }
}

function openOrder(type) { 
    const currentModel = document.getElementById('pName').innerText;
    document.getElementById('modalTitle').innerText = type; 
    document.getElementById('fType').value = type; 
    document.getElementById('fModel').value = currentModel; 
    
    // Variant selection for Electrino One
    if(currentModel === "Electrino One" && type !== 'EMI INQUIRY') {
        document.getElementById('variantSection').style.display = 'block';
        toggleWarranty(); // Check warranty status immediately
    } else {
        document.getElementById('variantSection').style.display = 'none';
        document.getElementById('warrantySection').style.display = 'none';
    }
    
    document.getElementById('orderModal').style.display = 'flex'; 
}

function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }
window.onload = () => { loadSidebar(); showProduct(0); }
</script>
</body>
</html>
